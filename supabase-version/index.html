<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>管理職勤怠管理 Supabase版</title>
    <link rel="stylesheet" href="./styles.css">
    <script src="./config.js"></script>
    <script type="module" src="./app.js?v=20260508-1600"></script>
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <div class="brand">
          <h1 id="appName">管理職勤怠管理</h1>
          <span id="periodLabel">Supabase版</span>
        </div>
        <div class="account" id="account"></div>
      </header>

      <main class="main">
        <div id="message"></div>

        <section id="loginPanel" class="panel">
          <h2>ログイン</h2>
          <div class="fields">
            <label>メールアドレス<input id="loginEmail" type="email" autocomplete="email" placeholder="example@company.com"></label>
            <label>パスワード<input id="loginPassword" type="password" autocomplete="current-password"></label>
          </div>
          <div class="actions">
            <button id="loginButton">ログイン</button>
            <button id="forgotPasswordButton" class="secondary">パスワードリセット</button>
          </div>
        </section>

        <section id="passwordResetPanel" class="panel hidden">
          <h2>新しいパスワードを設定</h2>
          <div class="fields">
            <label>新しいパスワード<input id="newPassword" type="password" autocomplete="new-password" placeholder="6文字以上"></label>
            <label>確認<input id="confirmPassword" type="password" autocomplete="new-password"></label>
          </div>
          <div class="actions">
            <button id="setPasswordButton">パスワードを変更</button>
          </div>
        </section>

        <section id="unauthorizedPanel" class="panel hidden">
          <h2>未登録アカウント</h2>
          <p id="unauthorizedText"></p>
          <div class="actions">
            <button id="logoutUnauthorizedButton" class="secondary">ログアウト</button>
          </div>
        </section>

        <div id="appPanel" class="grid hidden">
          <section class="panel today">
            <h2>今日</h2>
            <div class="status">
              <div class="status-row"><span>日付</span><span class="value" id="todayDate"></span></div>
              <div class="status-row"><span>出勤</span><span class="value" id="todayClockIn"></span></div>
              <div class="status-row"><span>退勤</span><span class="value" id="todayClockOut"></span></div>
              <div class="status-row"><span>勤務区分</span><span class="value" id="todayKind"></span></div>
            </div>
            <div class="actions">
              <button id="clockInButton">出勤</button>
              <button id="clockOutButton">退勤</button>
              <button id="logoutButton" class="secondary">ログアウト</button>
            </div>
          </section>

          <section class="panel monthly">
            <h2>月次</h2>
            <div class="actions">
              <input id="periodInput" type="month">
              <select id="scopeInput">
                <option value="self">自分</option>
                <option value="all">全員</option>
              </select>
              <button id="reloadMonthlyButton" class="secondary">表示</button>
              <button id="exportCsvButton" class="secondary hidden">CSV</button>
              <span id="closingBadge" class="badge"></span>
            </div>
            <div id="summary" class="summary"></div>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>日付</th>
                    <th>曜日</th>
                    <th>日区分</th>
                    <th>氏名</th>
                    <th>勤務区分</th>
                    <th>出勤</th>
                    <th>退勤</th>
                    <th>休憩</th>
                    <th>勤務</th>
                    <th>深夜</th>
                    <th>休暇</th>
                    <th>備考</th>
                  </tr>
                </thead>
                <tbody id="monthlyBody"></tbody>
              </table>
            </div>
          </section>

          <section class="panel full">
            <div class="tabs">
              <button class="tab active" data-tab="leave">休暇</button>
              <button class="tab hidden" data-tab="admin" id="adminTabButton">勤怠修正</button>
              <button class="tab hidden" data-tab="calendar" id="calendarTabButton">カレンダー</button>
              <button class="tab hidden" data-tab="users" id="usersTabButton">ユーザー</button>
            </div>

            <div id="leaveTab">
              <h2>休暇登録</h2>
              <div class="fields">
                <label>日付<input id="leaveDate" type="date"></label>
                <label>区分<select id="leaveKind"></select></label>
                <label>時間休<input id="leaveHours" type="number" min="0" step="1"></label>
                <label>備考<input id="leaveNote"></label>
              </div>
              <div class="actions">
                <button id="saveLeaveButton">登録</button>
              </div>
            </div>

            <div id="adminTab" class="hidden">
              <h2>勤怠修正</h2>
              <div class="fields">
                <label>対象者<select id="adminUserId"></select></label>
                <label>日付<input id="adminDate" type="date"></label>
                <label>読み込み<button id="adminLoadButton" type="button" class="secondary">対象を読み込み</button></label>
                <label>勤務区分<select id="adminKind"></select></label>
                <label>休暇時間<input id="adminLeaveHours" type="number" min="0" step="1"></label>
                <label>出勤<input id="adminClockIn" type="time"></label>
                <label>退勤<input id="adminClockOut" type="time"></label>
                <label>備考<input id="adminNote"></label>
                <label>修正理由<input id="adminReason" placeholder="例: 打刻忘れのため修正"></label>
              </div>
              <div id="adminEditStatus" class="edit-status"></div>
              <div class="actions">
                <button id="adminSaveButton">修正を保存</button>
                <button id="closeMonthButton" class="secondary">月締め</button>
                <button id="reopenMonthButton" class="danger">締め解除</button>
              </div>
            </div>

            <div id="calendarTab" class="hidden">
              <h2>カレンダー</h2>
              <div class="fields">
                <label>日付<input id="calendarDate" type="date"></label>
                <label>区分<select id="calendarType"></select></label>
                <label>名称<input id="calendarName"></label>
                <label>備考<input id="calendarNote"></label>
              </div>
              <div class="actions">
                <button id="saveCalendarButton">保存</button>
              </div>
            </div>

            <div id="usersTab" class="hidden">
              <h2>ユーザー管理</h2>
              <p class="help-text">1行に「メールアドレス, 氏名, admin/user, TRUE/FALSE」の形式で記入してください。</p>
              <textarea id="usersText"></textarea>
              <div class="actions">
                <button id="saveUsersButton">保存</button>
              </div>

              <h3>パスワードリセット送信</h3>
              <p class="help-text">指定したメールアドレスにパスワードリセットのメールを送信します。（ユーザーはSupabase Dashboardで事前に作成が必要です）</p>
              <div class="fields">
                <label>メールアドレス<input id="resetEmail" type="email" placeholder="example@company.com"></label>
              </div>
              <div class="actions">
                <button id="sendResetButton" class="secondary">リセットメールを送信</button>
              </div>
            </div>
          </section>
        </div>
      </main>
    </div>
  </body>
</html>
